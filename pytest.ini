[pytest]
testpaths = tests
norecursedirs = _release_staging docs .git .venv __pycache__ 02_wardrobe_images 03_database 04_user_data
addopts = -ra
markers =
    unit: fast, isolated tests for pure helpers and small modules.
    smoke: fast confidence checks for key entrypoints and critical flows.
    contract: compatibility and interface tests for repo contracts.
    integration: broader multi-module tests with filesystem or process interaction.
    ops: tests for tooling, reports, gates, handoff, audit and release helpers.
    docs: tests that validate documentation navigation and repo guidance.
